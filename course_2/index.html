<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 점심메뉴 투표 | Lunch Vote</title>
    <meta name="description" content="매일 즐거운 점심 시간! 오늘의 메뉴를 함께 골라보세요.">
    
    <!-- 프로젝트 스타일시트 및 Google Fonts 연동 -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 배경 장식 요소 -->
    <div class="background-decor"></div>

    <main class="container">
        <!-- 상단 헤더 섹션: 제목 및 안내 문구 -->
        <header class="header">
            <h1 class="title">오늘 뭐 먹지? <span>점심 메뉴 투표</span></h1>
            <p class="subtitle">마음에 드는 메뉴 하나를 선택하고 투표해주세요!</p>
        </header>

        <!-- 메뉴 선택 영역: 클릭 가능한 메뉴 카드들 -->
        <section class="menu-selection" id="menuSelection">
            <div class="menu-grid">
                <!-- 각 카드는 data-menu 속성을 통해 ID를 구분함 -->
                <button class="menu-card" data-menu="hamburger">
                    <div class="menu-icon">🍔</div>
                    <span class="menu-name">햄버거</span>
                </button>
                <button class="menu-card" data-menu="pork-cutlet">
                    <div class="menu-icon">🥩</div>
                    <span class="menu-name">돈까스</span>
                </button>
                <button class="menu-card" data-menu="chinese">
                    <div class="menu-icon">🍜</div>
                    <span class="menu-name">중국요리</span>
                </button>
                <button class="menu-card" data-menu="mahachai">
                    <div class="menu-icon">🥘</div>
                    <span class="menu-name">마하차이</span>
                </button>
                <button class="menu-card" data-menu="subway">
                    <div class="menu-icon">🥪</div>
                    <span class="menu-name">서브웨이</span>
                </button>
            </div>
            
            <!-- 투표 제출 버튼 -->
            <button class="vote-button" id="voteBtn" disabled>투표하기</button>
        </section>

        <!-- 결과 표시 영역: 실시간 투표 수치 및 그래프 -->
        <section class="results-area" id="resultsArea">
            <h2 class="result-title">투표 결과 ✨</h2>
            <div class="result-list" id="resultList">
                <!-- script.js에 의해 동적으로 투표 결과 항목이 생성됨 -->
            </div>
            
            <!-- 하단 총 투표수 정보 -->
            <div class="total-info">
                총 투표수: <span id="totalVotes">0</span>
            </div>
        </section>
    </main>

    <!-- 메인 비즈니스 로직 스크립트 로드 -->
    <script src="script.js"></script>
</body>
</html>
